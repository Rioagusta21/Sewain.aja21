<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sewain.aja – Sewa Sepatu Bola & Futsal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<!-- Firebase SDKs (compat build — works without bundler, plain <script> tags) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
/* ============================================================
   RESET & BASE
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0A0A0A;
  --dark:#111111;
  --card:#1A1A1A;
  --border:#2A2A2A;
  --green:#00C853;
  --green-dark:#009624;
  --green-glow:rgba(0,200,83,0.25);
  --yellow:#FFD600;
  --white:#FFFFFF;
  --gray:#888888;
  --gray-light:#BBBBBB;
  --red:#FF3D3D;
  --orange:#FF9800;
  --radius:12px;
  --radius-sm:8px;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
  --shadow-green:0 4px 24px rgba(0,200,83,0.3);
  --transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;
  background:var(--black);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.6;
}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;outline:none}
input,select,textarea{font-family:'Inter',sans-serif;outline:none}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--dark)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--green)}

/* ============================================================
   UTILITY
============================================================ */
.hidden{display:none!important}
.flex{display:flex}
.flex-col{flex-direction:column}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.justify-center{justify-content:center}
.gap-1{gap:8px}
.gap-2{gap:12px}
.gap-3{gap:16px}
.gap-4{gap:24px}
.text-green{color:var(--green)}
.text-yellow{color:var(--yellow)}
.text-gray{color:var(--gray)}
.text-red{color:var(--red)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.font-bold{font-weight:700}
.font-600{font-weight:600}
.w-full{width:100%}
.mt-1{margin-top:8px}
.mt-2{margin-top:12px}
.mt-3{margin-top:16px}
.mt-4{margin-top:24px}
.badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
}
.badge-green{background:rgba(0,200,83,0.15);color:var(--green);border:1px solid rgba(0,200,83,0.3)}
.badge-red{background:rgba(255,61,61,0.15);color:var(--red);border:1px solid rgba(255,61,61,0.3)}
.badge-orange{background:rgba(255,152,0,0.15);color:var(--orange);border:1px solid rgba(255,152,0,0.3)}
.badge-gray{background:rgba(136,136,136,0.15);color:var(--gray-light);border:1px solid rgba(136,136,136,0.3)}

/* ============================================================
   BUTTONS
============================================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 24px;border-radius:var(--radius-sm);font-weight:600;
  font-size:14px;transition:var(--transition);letter-spacing:.3px;
}
.btn-green{background:var(--green);color:var(--black)}
.btn-green:hover{background:#00e65c;box-shadow:var(--shadow-green);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--green);color:var(--green)}
.btn-red{background:rgba(255,61,61,0.15);color:var(--red);border:1px solid rgba(255,61,61,0.3)}
.btn-red:hover{background:rgba(255,61,61,0.25)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-xs{padding:5px 12px;font-size:12px;border-radius:6px}
.btn-yellow{background:var(--yellow);color:var(--black)}
.btn-yellow:hover{background:#ffe033}
.btn-dark{background:var(--card);color:var(--white);border:1px solid var(--border)}
.btn-dark:hover{border-color:var(--green)}

/* ============================================================
   FORMS
============================================================ */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--gray-light);margin-bottom:6px;letter-spacing:.3px}
.form-control{
  width:100%;background:var(--dark);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:11px 14px;
  color:var(--white);font-size:14px;transition:var(--transition);
}
.form-control:focus{border-color:var(--green);box-shadow:0 0 0 3px var(--green-glow)}
.form-control::placeholder{color:var(--gray)}
select.form-control option{background:var(--dark)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ============================================================
   MODAL
============================================================ */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:9000;align-items:center;justify-content:center;padding:16px;
  backdrop-filter:blur(4px);
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--dark);border:1px solid var(--border);border-radius:var(--radius);
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:modalIn .25s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 24px;border-bottom:1px solid var(--border);
}
.modal-title{font-size:16px;font-weight:700}
.modal-close{
  width:32px;height:32px;border-radius:50%;background:var(--card);
  display:flex;align-items:center;justify-content:center;
  color:var(--gray);cursor:pointer;transition:var(--transition);border:none;
}
.modal-close:hover{background:var(--border);color:var(--white)}
.modal-body{padding:24px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border);
  display:flex;gap:12px;justify-content:flex-end;
}

/* ============================================================
   TOAST
============================================================ */
#toast-container{
  position:fixed;top:20px;right:20px;z-index:99999;
  display:flex;flex-direction:column;gap:10px;
}
.toast{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px 18px;font-size:14px;font-weight:500;
  display:flex;align-items:center;gap:10px;min-width:260px;
  box-shadow:var(--shadow);animation:toastIn .3s ease;
}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.warning{border-left:3px solid var(--orange)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ============================================================
   LANDING PAGE - NAVBAR
============================================================ */
#landing-page{display:block}
#dashboard-page{display:none}

.navbar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(10,10,10,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:var(--transition);
}
.nav-logo{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;
  color:var(--white);display:flex;align-items:center;gap:4px;
}
.nav-logo span{color:var(--green)}
.nav-links{display:flex;align-items:center;gap:32px}
.nav-links a{font-size:13px;font-weight:500;color:var(--gray-light);transition:var(--transition);letter-spacing:.3px}
.nav-links a:hover{color:var(--green)}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-wa{
  display:flex;align-items:center;gap:8px;
  background:var(--green);color:var(--black);
  padding:8px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:700;transition:var(--transition);
}
.nav-wa:hover{background:#00e65c;transform:translateY(-1px);box-shadow:var(--shadow-green)}
.nav-dash{
  background:var(--card);border:1px solid var(--border);
  color:var(--white);padding:8px 18px;border-radius:var(--radius-sm);
  font-size:13px;font-weight:600;transition:var(--transition);cursor:pointer;
}
.nav-dash:hover{border-color:var(--green);color:var(--green)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.nav-hamburger span{width:24px;height:2px;background:var(--white);border-radius:2px;transition:var(--transition)}
.mobile-menu{
  display:none;position:fixed;top:64px;left:0;right:0;z-index:999;
  background:var(--dark);border-bottom:1px solid var(--border);
  padding:16px 24px;flex-direction:column;gap:4px;
}
.mobile-menu.open{display:flex}
.mobile-menu a{padding:12px 0;font-size:14px;font-weight:500;color:var(--gray-light);border-bottom:1px solid var(--border)}
.mobile-menu a:last-child{border:none}
.mobile-menu a:hover{color:var(--green)}

/* ============================================================
   HERO SECTION
============================================================ */
.hero{
  position:relative;min-height:100vh;display:flex;align-items:center;
  padding:100px 24px 60px;overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 70% 50%, rgba(0,200,83,0.12) 0%, transparent 70%),
             radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,214,0,0.08) 0%, transparent 60%);
}
/* Hex grid decoration */
.hero-hex{
  position:absolute;right:-5%;top:0;bottom:0;width:55%;
  opacity:0.07;
  background-image:
    repeating-linear-gradient(60deg,var(--green) 0,var(--green) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(120deg,var(--green) 0,var(--green) 1px,transparent 0,transparent 50%),
    repeating-linear-gradient(0deg,var(--green) 0,var(--green) 1px,transparent 0,transparent 50%);
  background-size:40px 70px;
  mask-image:linear-gradient(to right,transparent 0%,black 30%,black 100%);
}
.hero-content{position:relative;z-index:1;max-width:600px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.25);
  padding:6px 14px;border-radius:20px;margin-bottom:20px;
}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.hero-eyebrow span{font-size:12px;font-weight:600;color:var(--green);letter-spacing:1px;text-transform:uppercase}
.hero h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(52px,8vw,88px);line-height:.95;
  letter-spacing:1px;margin-bottom:16px;
}
.hero h1 em{color:var(--green);font-style:normal}
.hero h1 .yellow{color:var(--yellow)}
.hero-sub{font-size:clamp(14px,2vw,17px);color:var(--gray-light);margin-bottom:32px;max-width:460px;line-height:1.7}
.hero-ctas{display:flex;gap:12px;flex-wrap:wrap}
.hero-cta-wa{
  display:flex;align-items:center;gap:10px;
  background:var(--green);color:var(--black);
  padding:14px 28px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:700;transition:var(--transition);
  box-shadow:0 0 40px rgba(0,200,83,0.3);
}
.hero-cta-wa:hover{background:#00e65c;transform:translateY(-2px);box-shadow:0 0 60px rgba(0,200,83,0.4)}
.hero-cta-catalog{
  display:flex;align-items:center;gap:10px;
  background:transparent;color:var(--white);
  padding:14px 28px;border-radius:var(--radius-sm);
  font-size:15px;font-weight:600;transition:var(--transition);
  border:1px solid rgba(255,255,255,0.2);
}
.hero-cta-catalog:hover{border-color:var(--white);background:rgba(255,255,255,0.05)}
.hero-stats{
  display:flex;gap:32px;margin-top:48px;padding-top:32px;
  border-top:1px solid var(--border);
}
.hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--green);line-height:1}
.hero-stat-label{font-size:12px;color:var(--gray);margin-top:4px;letter-spacing:.3px}
/* Right side visual */
.hero-visual{
  position:absolute;right:0;top:0;bottom:0;width:45%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.hero-shoe-glow{
  position:absolute;width:400px;height:400px;
  border-radius:50%;background:radial-gradient(circle,rgba(0,200,83,0.2) 0%,transparent 70%);
  animation:floatGlow 4s ease-in-out infinite;
}
@keyframes floatGlow{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-20px) scale(1.05)}}
.hero-shoe-emoji{font-size:160px;animation:floatGlow 4s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(0,200,83,0.4))}

/* ============================================================
   SECTION COMMONS
============================================================ */
.section{padding:80px 24px}
.section-inner{max-width:1100px;margin:0 auto}
.section-label{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--green);margin-bottom:12px;
}
.section-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(36px,5vw,56px);line-height:1;letter-spacing:.5px;
  margin-bottom:16px;
}
.section-sub{font-size:15px;color:var(--gray-light);max-width:500px;line-height:1.7;margin-bottom:48px}
.slash-divider{
  display:flex;align-items:center;gap:16px;margin-bottom:48px;
}
.slash-divider::before,.slash-divider::after{
  content:'';flex:1;height:1px;background:linear-gradient(to right,var(--green),transparent);
}
.slash-divider::after{background:linear-gradient(to left,var(--green),transparent)}

/* ============================================================
   FEATURES
============================================================ */
.features-bg{background:var(--dark)}
.features-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;
}
.feature-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 24px;transition:var(--transition);position:relative;overflow:hidden;
}
.feature-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,var(--green),var(--yellow));
  transform:scaleX(0);transform-origin:left;transition:var(--transition);
}
.feature-card:hover{border-color:var(--green);transform:translateY(-4px);box-shadow:var(--shadow-green)}
.feature-card:hover::before{transform:scaleX(1)}
.feature-icon{
  width:52px;height:52px;border-radius:12px;
  background:rgba(0,200,83,0.12);border:1px solid rgba(0,200,83,0.2);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;margin-bottom:16px;
}
.feature-title{font-size:15px;font-weight:700;margin-bottom:8px}
.feature-desc{font-size:13px;color:var(--gray);line-height:1.6}

/* ============================================================
   HOW TO RENT
============================================================ */
.steps-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;
  counter-reset:step;
}
.step-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 20px;position:relative;transition:var(--transition);
  counter-increment:step;
}
.step-card::before{
  content:counter(step,decimal-leading-zero);
  font-family:'Bebas Neue',sans-serif;font-size:64px;
  color:rgba(0,200,83,0.06);position:absolute;top:-8px;right:12px;line-height:1;
}
.step-card:hover{border-color:rgba(0,200,83,0.3)}
.step-icon{font-size:32px;margin-bottom:12px}
.step-title{font-size:15px;font-weight:700;margin-bottom:6px}
.step-desc{font-size:13px;color:var(--gray);line-height:1.6}

/* ============================================================
   CATALOG (PUBLIC)
============================================================ */
.catalog-filter{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;
}
.filter-btn{
  padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;
  background:var(--card);border:1px solid var(--border);color:var(--gray-light);
  cursor:pointer;transition:var(--transition);
}
.filter-btn.active,.filter-btn:hover{
  background:rgba(0,200,83,0.12);border-color:var(--green);color:var(--green);
}
.catalog-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;
}
.shoe-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;transition:var(--transition);
}
.shoe-card:hover{border-color:rgba(0,200,83,0.3);transform:translateY(-4px);box-shadow:var(--shadow)}
.shoe-card-img{
  height:180px;background:var(--dark);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.shoe-card-img img{width:100%;height:100%;object-fit:cover}
.shoe-card-img-placeholder{font-size:64px;opacity:0.3}
.shoe-card-status{
  position:absolute;top:12px;right:12px;
}
.shoe-card-body{padding:16px}
.shoe-card-name{font-size:15px;font-weight:700;margin-bottom:4px}
.shoe-card-meta{font-size:12px;color:var(--gray);margin-bottom:12px}
.shoe-card-price{
  font-family:'Bebas Neue',sans-serif;font-size:24px;
  color:var(--green);margin-bottom:12px;
}
.shoe-card-price span{font-family:'Inter',sans-serif;font-size:12px;color:var(--gray);font-weight:400}
.shoe-card-action{width:100%}

/* ============================================================
   LOCATION
============================================================ */
.location-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:center}
.location-info{display:flex;flex-direction:column;gap:20px}
.location-item{display:flex;gap:16px;align-items:flex-start}
.location-icon{
  width:44px;height:44px;border-radius:10px;
  background:rgba(0,200,83,0.1);border:1px solid rgba(0,200,83,0.2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;
}
.location-item-title{font-size:13px;color:var(--gray);margin-bottom:4px}
.location-item-val{font-size:15px;font-weight:600}
.location-map{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  height:280px;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:24px;
}

/* ============================================================
   FAQ
============================================================ */
.faq-list{max-width:720px}
.faq-item{border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
.faq-question{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 20px;cursor:pointer;font-weight:600;font-size:14px;
  transition:var(--transition);user-select:none;
}
.faq-question:hover{color:var(--green)}
.faq-chevron{transition:transform .3s ease;font-size:12px;color:var(--gray)}
.faq-item.open .faq-chevron{transform:rotate(180deg);color:var(--green)}
.faq-answer{
  max-height:0;overflow:hidden;transition:max-height .3s ease;
  padding:0 20px;color:var(--gray-light);font-size:14px;line-height:1.7;
}
.faq-item.open .faq-answer{max-height:200px;padding:0 20px 18px}

/* ============================================================
   FLOATING WA BUTTON
============================================================ */
.wa-float{
  position:fixed;bottom:28px;right:24px;z-index:5000;
  width:56px;height:56px;border-radius:50%;
  background:var(--green);display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,200,83,0.4),0 0 0 0 rgba(0,200,83,0.4);
  transition:var(--transition);animation:waPulse 3s infinite;
  cursor:pointer;
}
.wa-float:hover{transform:sc
